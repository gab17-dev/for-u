<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fff;
  color: #7a0c0c;
  text-align: center;
}

/* Pages */
.page {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

/* Title */
.title {
  font-family: 'Pacifico', cursive;
  font-size: 2.5rem;
}

/* Buttons */
.btn {
  margin: 10px;
  padding: 10px 20px;
  border: 2px solid #7a0c0c;
  border-radius: 25px;
  background: transparent;
  color: #7a0c0c;
  cursor: pointer;
}

.btn:hover {
  background: #7a0c0c;
  color: white;
}

/* Menu grid */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  gap: 20px;
  margin-top: 20px;
}

.card {
  border: 3px solid #7a0c0c;
  padding: 30px;
  border-radius: 20px;
  cursor: pointer;
}

/* Dodging button */
#noBtn {
  position: absolute;
}

/* Simple gallery */
.gallery img {
  width: 120px;
  margin: 5px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- START PAGE -->
<div class="page active" id="start">
  <div class="title">Hello My Love ❤️</div>
  <p>Do you want to see your gift?</p>
  <div>
    <button class="btn" onclick="showPage('menu')">YES PLEASE</button>
    <button class="btn" id="noBtn">NO THANKS</button>
  </div>
</div>

<!-- MENU -->
<div class="page" id="menu">
  <div class="title">These are for you!</div>

  <div class="grid">
    <div class="card" onclick="showPage('song')">🎵 Song</div>
    <div class="card" onclick="showPage('message')">💌 Message</div>
    <div class="card" onclick="showPage('memories')">📸 Memories</div>
    <div class="card" onclick="showPage('flowers')">🌷 Flowers</div>
  </div>
</div>

<!-- SONG -->
<div class="page" id="song">
  <h2>Song about you</h2>

  <iframe width="300" height="200"
    src="https://www.youtube.com/embed/2Vv-BfVoq4g"
    frameborder="0" allowfullscreen>
  </iframe>

  <button class="btn" onclick="showPage('menu')">RETURN</button>
</div>

<!-- MESSAGE -->
<div class="page" id="message">
  <h2>Message for my love</h2>
  <p style="max-width: 400px;">
    You make everything better. I'm really lucky to have you.
    I hope this little website makes you smile 💕
  </p>
  <button class="btn" onclick="showPage('menu')">RETURN</button>
</div>

<!-- MEMORIES -->
<div class="page" id="memories">
  <h2>Captured Memories</h2>
  <div class="gallery">
    <img src="https://picsum.photos/200?1">
    <img src="https://picsum.photos/200?2">
    <img src="https://picsum.photos/200?3">
  </div>
  <button class="btn" onclick="showPage('menu')">RETURN</button>
</div>

<!-- FLOWERS -->
<div class="page" id="flowers">
  <h2>🌷 Tulips</h2>
  <p>Your favorite flower 💖</p>
  <button class="btn" onclick="showPage('menu')">RETURN</button>
</div>

<script>
// Page switch
function showPage(pageId) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");
}

// Dodging NO button
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});
</script>

</body>
</html>
