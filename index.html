<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: #7a0c0c;
  text-align: center;

  background-color: #fff;
  background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
}

/* Pages */
.page {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.active { display: flex; }

/* Titles */
.title {
  font-family: 'Pacifico', cursive;
  font-size: 2.6rem;
}

/* Buttons */
.btn {
  margin: 10px;
  padding: 10px 25px;
  border: 2px solid #7a0c0c;
  border-radius: 25px;
  background: transparent;
  color: #7a0c0c;
  cursor: pointer;
}
.btn:hover {
  background: #7a0c0c;
  color: white;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  gap: 20px;
  margin-top: 20px;
}
.card {
  border: 3px solid #7a0c0c;
  padding: 30px;
  border-radius: 20px;
  cursor: pointer;
}

/* FLOWER PAGE */
.flower-box {
  position: relative;
  width: 90%;
  max-width: 750px;
  height: 500px;
  margin: 40px auto;
}

/* Flower image */
.flower-img {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 260px;
  filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2));
  animation: float 3s ease-in-out infinite;
}

/* Floating heart */
.heart {
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  animation: float 2.5s ease-in-out infinite;
}

/* Sparkles */
.sparkle {
  position: absolute;
  font-size: 14px;
  opacity: 0.8;
  animation: twinkle 2s infinite alternate;
}

.s1 { top: 20%; left: 30%; }
.s2 { top: 30%; right: 25%; }
.s3 { bottom: 25%; left: 35%; }
.s4 { bottom: 20%; right: 30%; }

@keyframes twinkle {
  from { opacity: 0.3; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1.2); }
}

/* Bubbles */
.bubble {
  position: absolute;
  max-width: 160px;
  padding: 10px;
  border: 2px solid #7a0c0c;
  border-radius: 20px;
  background: white;
  font-size: 12px;
  opacity: 0;
  transform: scale(0.8);
  animation: pop 0.5s forwards;
}

/* LEFT */
.left { left: 0; }
.b1 { top: 10%; animation-delay: .2s; }
.b2 { top: 40%; animation-delay: .4s; }
.b3 { top: 70%; animation-delay: .6s; }

/* RIGHT */
.right { right: 0; }
.b4 { top: 15%; animation-delay: .8s; }
.b5 { top: 45%; animation-delay: 1s; }
.b6 { top: 75%; animation-delay: 1.2s; }

/* Lines */
.bubble::after {
  content: "";
  position: absolute;
  width: 50px;
  height: 2px;
  background: #7a0c0c;
  top: 50%;
}
.left::after { right: -50px; }
.right::after { left: -50px; }

/* Animations */
@keyframes pop {
  to { opacity: 1; transform: scale(1); }
}

@keyframes float {
  0% { transform: translate(-50%, -50%) translateY(0); }
  50% { transform: translate(-50%, -50%) translateY(-10px); }
  100% { transform: translate(-50%, -50%) translateY(0); }
}
</style>
</head>

<body>

<!-- START -->
<div class="page active" id="start">
  <div class="title">Hello My Love ❤️</div>
  <p>Do you want to see your gift?</p>

  <button class="btn" onclick="showPage('menu')">YES PLEASE</button>
  <button class="btn" onclick="showPage('noPage')">NO THANKS</button>
</div>

<!-- NO PAGE -->
<div class="page" id="noPage">
  <div style="font-size:40px;">🥺</div>
  <div class="title">I promise you'll like it</div>
  <button class="btn" onclick="showPage('start')">TRY AGAIN</button>
</div>

<!-- MENU -->
<div class="page" id="menu">
  <div class="title">These are for you!</div>

  <div class="grid">
    <div class="card" onclick="showPage('song')">🎵</div>
    <div class="card" onclick="showPage('message')">💌</div>
    <div class="card" onclick="showPage('memories')">📸</div>
    <div class="card" onclick="showPage('flowers')">🌷</div>
  </div>
</div>

<!-- FLOWERS -->
<div class="page" id="flowers">

  <h2 class="title">TULIPS</h2>
  <p>your favorite flower</p>

  <div class="flower-box">

    <!-- HEART -->
    <div class="heart">❤️</div>

    <!-- SPARKLES -->
    <div class="sparkle s1">✨</div>
    <div class="sparkle s2">✨</div>
    <div class="sparkle s3">✨</div>
    <div class="sparkle s4">✨</div>

    <!-- IMAGE -->
    <img src="tulips.png" class="flower-img">

    <!-- BUBBLES -->
    <div class="bubble left b1">you make me happy</div>
    <div class="bubble left b2">i love your smile</div>
    <div class="bubble left b3">you mean so much to me</div>

    <div class="bubble right b4">you're special</div>
    <div class="bubble right b5">you deserve the best</div>
    <div class="bubble right b6">i appreciate you</div>

  </div>

  <button class="btn" onclick="showPage('menu')">RETURN</button>

</div>

<script>
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
