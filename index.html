<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Letter</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f0f1a, #050510);
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #00c6ff, #ff00cc);
  -webkit-background-clip: text;
  color: transparent;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(90deg, #00c6ff, #ff00cc);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,0,200,0.5);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
}

.popup-content {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  max-width: 400px;
  animation: fadeUp 0.5s ease;
}

.close {
  margin-top: 15px;
  cursor: pointer;
  color: #ff66cc;
}

/* HEARTS */
.heart {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

/* Animations */
@keyframes floatUp {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}

@keyframes fadeUp {
  from {
    transform: translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
</style>
</head>

<body>

<section class="hero">
  <h1 id="typing"></h1>
  <button class="btn" onclick="openPopup()">Open Message 💌</button>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h2>For You 💙</h2>
    <p>
      Just wanted to remind you that you're special,  
      appreciated, and you make everything better.  
      Stay amazing always ✨
    </p>
    <div class="close" onclick="closePopup()">Close</div>
  </div>
</div>

<script>
// Typing effect
const text = "Hey... this is for you 💙";
let i = 0;
function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 60);
  }
}
type();

// Popup
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// Hearts animation
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 15 + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
