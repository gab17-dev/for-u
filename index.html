<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Animated Letter</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f0f1a, #050510);
  color: white;
  overflow-x: hidden;
}

/* Floating particles */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* Hero */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
  padding: 20px;
}

h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #00c6ff, #ff00cc);
  -webkit-background-clip: text;
  color: transparent;
  animation: fadeUp 1.5s ease;
}

p {
  margin-top: 15px;
  opacity: 0.8;
  animation: fadeUp 2s ease;
}

.btn {
  margin-top: 25px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  color: white;
  background: linear-gradient(90deg, #00c6ff, #ff00cc);
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(255,0,200,0.5);
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px rgba(255,0,200,0.9);
}

/* Sections */
.section {
  padding: 80px 20px;
  text-align: center;
}

.cards {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 20px;
  width: 250px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}

/* Animations */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<section class="hero">
  <h1 id="typing"></h1>
  <p>A sweet little website made just for you 💙</p>
  <button class="btn">Open Message</button>
</section>

<section class="section">
  <h2>Why You’re Special</h2>
  <div class="cards">
    <div class="card">✨ You make everything better</div>
    <div class="card">💙 You bring happiness</div>
    <div class="card">🌙 You are one of a kind</div>
  </div>
</section>

<section class="section">
  <h2>Stay Amazing</h2>
  <p>Never forget how awesome you are.</p>
</section>

<footer>
  Made with ❤️
</footer>

<script>
// Typing effect
const text = "Hey... This is for you 💙";
let i = 0;
function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 60);
  }
}
type();

// Particle background
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: (Math.random() - 0.5),
    dy: (Math.random() - 0.5)
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(255,255,255,0.5)";

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
