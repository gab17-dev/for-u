<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  color: white;

  /* Animated gradient */
  background: linear-gradient(270deg, #0a0f2c, #1a0033, #000000, #2a0a4a);
  background-size: 600% 600%;
  animation: gradientShift 20s ease infinite;
  position: relative;
}

/* Gradient animation */
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Stars */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: 
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(1.5px 1.5px at 70% 80%, white, transparent),
    radial-gradient(1px 1px at 40% 60%, white, transparent),
    radial-gradient(2px 2px at 90% 20%, white, transparent),
    radial-gradient(1px 1px at 10% 90%, white, transparent);

  background-repeat: repeat;
  opacity: 0.6;
  z-index: -1;
}

/* Sections */
.section {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

/* Title */
h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #00c6ff, #ff00cc);
  -webkit-background-clip: text;
  color: transparent;
}

/* Button */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(90deg, #00c6ff, #ff00cc);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(255,0,200,0.5);
}

.btn:hover {
  transform: scale(1.1);
}

/* Gallery */
.gallery {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
}

.gallery img {
  width: 200px;
  border-radius: 15px;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.1);
}

/* Popup */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
}

.popup-content {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  max-width: 400px;
}

/* Hearts */
.heart {
  position: fixed;
  color: pink;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<section class="section">
  <h1 id="typing"></h1>
  <button class="btn" onclick="startExperience()">Start 💙</button>
</section>

<section class="section">
  <h2>📸 Memories</h2>
  <div class="gallery">
    <img src="https://picsum.photos/200?1">
    <img src="https://picsum.photos/200?2">
    <img src="https://picsum.photos/200?3">
  </div>
</section>

<section class="section">
  <h2>💙 A Message</h2>
  <button class="btn" onclick="openPopup(1)">Open Letter</button>
</section>

<section class="section">
  <h2>🌙 Another One</h2>
  <button class="btn" onclick="openPopup(2)">Read More</button>
</section>

<section class="section">
  <h2>✨ Final Message</h2>
  <p>You are special. Always remember that 💙</p>
</section>

<div class="popup" id="popup">
  <div class="popup-content" id="popupText"></div>
</div>

<script>
// Typing
const text = "Hey... this is for you 💙";
let i = 0;
function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 60);
  }
}
type();

// Start experience
function startExperience() {
  document.getElementById("music").play();
  window.scrollTo({ top: window.innerHeight, behavior: "smooth" });
}

// Popup
function openPopup(type) {
  const popup = document.getElementById("popup");
  const content = document.getElementById("popupText");

  if (type === 1) {
    content.innerHTML = `
      <h2>For You 💙</h2>
      <p>You make everything brighter. I hope you always smile ✨</p>
      <button class="btn" onclick="closePopup()">Close</button>
    `;
  } else {
    content.innerHTML = `
      <h2>Still You 💙</h2>
      <p>No matter what happens, you're still amazing.</p>
      <button class="btn" onclick="closePopup()">Close</button>
    `;
  }

  popup.style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// Hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 15 + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
